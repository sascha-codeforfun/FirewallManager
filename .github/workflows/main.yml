name: Release
on:
  push:
    tags: ['v*', '[0-9]*']   # matches v1.0.0 AND 1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach assets to (e.g. 1.0.0)'
        required: true
permissions:
  contents: write        # create the Release
  id-token: write        # mint OIDC token for attestation
  attestations: write    # store the provenance attestation
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish single-file exe
        run: >
          dotnet publish FirewallManager.csproj
          -c Release -r win-x64 --self-contained true
          -p:Platform=x64
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish
      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $exe = "publish/FirewallManager.exe"
          (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower() + "  FirewallManager.exe" |
            Out-File -Encoding ascii publish/FirewallManager.exe.sha256
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: publish/FirewallManager.exe
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            publish/FirewallManager.exe
            publish/FirewallManager.exe.sha256
